<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 Pixel Agents Studio</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d1a; display: flex; flex-direction: column; align-items: center; font-family: 'Courier New', monospace; overflow: hidden; min-height: 100vh; justify-content: center; }
  #title-bar { background: #0a0a14; padding: 6px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 2px solid #7c3aed; width: 780px; }
  #title-text { color: #a855f7; font-size: 13px; font-weight: bold; letter-spacing: 3px; }
  #hint { color: #475569; font-size: 10px; }
  #game-container { border: 2px solid #7c3aed; box-shadow: 0 0 30px #7c3aed44; }
  #chat-panel { background: #0f0f1a; border-top: 2px solid #7c3aed; padding: 10px 16px; display: none; width: 780px; max-height: 240px; }
  #chat-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  #agent-avatar { font-size: 20px; }
  #agent-name { color: #e2e8f0; font-size: 13px; font-weight: bold; }
  #close-chat { margin-left: auto; background: none; border: 1px solid #4b2e80; color: #a855f7; padding: 2px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
  #chat-messages { color: #94a3b8; font-size: 11px; line-height: 1.6; max-height: 100px; overflow-y: auto; margin-bottom: 8px; white-space: pre-wrap; border: 1px solid #1e1e3f; padding: 6px 8px; border-radius: 4px; background: #070710; }
  #chat-input-row { display: flex; gap: 8px; }
  #chat-input { flex: 1; background: #1a1a2e; border: 1px solid #334155; color: #e2e8f0; padding: 6px 10px; border-radius: 4px; font-family: inherit; font-size: 12px; outline: none; }
  #chat-input:focus { border-color: #7c3aed; }
  #send-btn { background: #7c3aed; border: none; color: white; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  #api-bar { background: #07070f; border-top: 1px solid #1e1e3f; padding: 5px 16px; display: flex; gap: 8px; align-items: center; width: 780px; }
  #api-input { flex: 1; background: #1a1a2e; border: 1px solid #334155; color: #e2e8f0; padding: 4px 8px; border-radius: 4px; font-size: 11px; outline: none; }
  #api-save { background: #059669; border: none; color: white; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; }
  #api-ok { color: #059669; font-size: 10px; }
</style>
</head>
<body>
<div id="title-bar">
  <span id="title-text">🎮 PIXEL AGENTS STUDIO</span>
  <span id="hint">Clique em um agente para conversar | 12 especialistas powered by Claude</span>
</div>
<div id="game-container"></div>
<div id="chat-panel">
  <div id="chat-header">
    <span id="agent-avatar">🎨</span>
    <span id="agent-name">Agente</span>
    <button id="close-chat" onclick="closeChat()">✕ fechar</button>
  </div>
  <div id="chat-messages">Selecione um agente para começar...</div>
  <div id="chat-input-row">
    <input id="chat-input" type="text" placeholder="Sua pergunta..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button id="send-btn" onclick="sendMessage()">▶ Enviar</button>
  </div>
</div>
<div id="api-bar">
  <span style="color:#64748b;font-size:11px;">🔑 Anthropic API Key:</span>
  <input id="api-input" type="password" placeholder="sk-ant-..." oninput="saveKey(this.value)">
  <button id="api-save" onclick="saveKey(document.getElementById('api-input').value)">Salvar</button>
  <span id="api-ok"></span>
</div>

<script>
let activeAgent = null;
let histories = {};
let apiKey = localStorage.getItem('ant_key') || '';
if(apiKey) { document.getElementById('api-input').value = apiKey; document.getElementById('api-ok').textContent = '✅'; }

function saveKey(v) {
  apiKey = v.trim();
  localStorage.setItem('ant_key', apiKey);
  document.getElementById('api-ok').textContent = apiKey ? '✅ salva' : '';
}

const AGENTS = [
  { id:'pd',  name:'Product Designer', emoji:'🎨', color:0xc026d3, hex:'#c026d3', col:0, row:0, system:'Você é um Product Designer Sênior. Especialista em design strategy, design systems e facilitação. Responda sempre em português brasileiro de forma direta e estratégica, com exemplos práticos.' },
  { id:'ux',  name:'UX Designer',      emoji:'🔍', color:0x2563eb, hex:'#3b82f6', col:1, row:0, system:'Você é um UX Designer Sênior. Especialista em jornadas do usuário, arquitetura de informação, wireframes e testes de usabilidade. Responda em português brasileiro.' },
  { id:'ui',  name:'UI Designer',      emoji:'🖌️', color:0x0891b2, hex:'#06b6d4', col:2, row:0, system:'Você é um UI Designer Sênior. Especialista em sistemas visuais, tipografia, tokens de design e acessibilidade WCAG. Responda em português brasileiro.' },
  { id:'re',  name:'UX Research',      emoji:'🔬', color:0x059669, hex:'#10b981', col:3, row:0, system:'Você é um UX Researcher Sênior. Especialista em pesquisa qualitativa e quantitativa, síntese de dados e frameworks como JTBD e Kano. Responda em português brasileiro.' },
  { id:'co',  name:'UX Content',       emoji:'✍️', color:0xd97706, hex:'#f59e0b', col:0, row:1, system:'Você é um UX Content Strategist. Especialista em microcopy, voz e tom, e acessibilidade de conteúdo. Responda em português brasileiro com exemplos práticos.' },
  { id:'de',  name:'Data Engineer',    emoji:'📊', color:0x0e7490, hex:'#0ea5e9', col:1, row:1, system:'Você é um Engenheiro de Dados Sênior. Especialista em pipelines ETL/ELT, dbt, Airflow e data warehouses. Responda em português brasileiro com código quando necessário.' },
  { id:'fs',  name:'Full Stack',       emoji:'⚙️', color:0x6366f1, hex:'#818cf8', col:2, row:1, system:'Você é um Engenheiro Full Stack Sênior. Especialista em arquitetura de sistemas, APIs REST/GraphQL, PostgreSQL e Docker. Responda em português brasileiro.' },
  { id:'fe',  name:'Front-end',        emoji:'💻', color:0x3b82f6, hex:'#60a5fa', col:3, row:1, system:'Você é um Engenheiro Front-end Sênior. Especialista em React 18+, TypeScript, performance e acessibilidade web. Responda em português brasileiro.' },
  { id:'qa',  name:'QA Sênior',        emoji:'🧪', color:0xdc2626, hex:'#f87171', col:0, row:2, system:'Você é um QA Sênior. Especialista em estratégia de testes, Playwright, BDD e shift-left testing. Responda em português brasileiro.' },
  { id:'an',  name:'Analista Prod.',   emoji:'📈', color:0x7c3aed, hex:'#a78bfa', col:1, row:2, system:'Você é um Analista de Produto Sênior. Especialista em analytics, SQL, A/B testing e North Star Metric. Responda em português brasileiro.' },
  { id:'ct',  name:'CTO',              emoji:'🏗️', color:0x94a3b8, hex:'#cbd5e1', col:2, row:2, system:'Você é um CTO. Especialista em visão técnica, roadmap tecnológico e cultura de engenharia. Responda em português brasileiro com visão estratégica.' },
  { id:'po',  name:'Product Owner',    emoji:'📋', color:0x16a34a, hex:'#4ade80', col:3, row:2, system:'Você é um Product Owner Sênior. Especialista em backlog, user stories com BDD e priorização ágil. Responda em português brasileiro.' },
];

function openChat(agent) {
  activeAgent = agent;
  document.getElementById('agent-avatar').textContent = agent.emoji;
  document.getElementById('agent-name').textContent = agent.name;
  document.getElementById('agent-name').style.color = agent.hex;
  document.getElementById('chat-panel').style.display = 'block';
  const h = histories[agent.id];
  if (h && h.length) {
    renderMsgs(agent.id);
  } else {
    document.getElementById('chat-messages').textContent = agent.emoji + ' Olá! Sou ' + agent.name + '. Como posso ajudar?';
  }
  document.getElementById('chat-input').focus();
}

function closeChat() {
  document.getElementById('chat-panel').style.display = 'none';
  activeAgent = null;
}

function renderMsgs(id) {
  const h = histories[id] || [];
  const el = document.getElementById('chat-messages');
  el.textContent = h.map(m => (m.role==='user' ? '▶ Você: ' : activeAgent.emoji + ' ' + activeAgent.name + ': ') + m.content).join('\n\n');
  el.scrollTop = el.scrollHeight;
}

async function sendMessage() {
  if (!activeAgent) return;
  const inp = document.getElementById('chat-input');
  const txt = inp.value.trim(); if (!txt) return;
  inp.value = '';
  if (!apiKey) { document.getElementById('chat-messages').textContent = '❌ Configure sua API Key abaixo!'; return; }
  const id = activeAgent.id;
  if (!histories[id]) histories[id] = [];
  histories[id].push({role:'user', content:txt});
  renderMsgs(id);
  const el = document.getElementById('chat-messages');
  el.textContent += '\n\n⏳ pensando...';
  el.scrollTop = el.scrollHeight;
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'x-api-key':apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
      body: JSON.stringify({ model:'claude-sonnet-4-5', max_tokens:1024, system:activeAgent.system, messages:histories[id].slice(-10) }),
    });
    const data = await r.json();
    histories[id].push({role:'assistant', content: r.ok ? data.content[0].text : '❌ ' + (data.error?.message || r.status)});
  } catch(e) { histories[id].push({role:'assistant', content:'❌ Erro: ' + e.message}); }
  renderMsgs(id);
}

// ── PHASER SCENE ────────────────────────────────────────────
class Office extends Phaser.Scene {
  constructor() { super('Office'); }

  create() {
    const W = 760, H = 520;
    const g = this.add.graphics();

    // ── Piso ─────────────────────────────────────────────
    // Tiles do piso com padrão xadrez
    for (let ty = 0; ty < H; ty += 40) {
      for (let tx = 0; tx < W; tx += 40) {
        const shade = ((Math.floor(tx/40) + Math.floor(ty/40)) % 2 === 0) ? 0x1e1e30 : 0x252538;
        g.fillStyle(shade); g.fillRect(tx, ty, 40, 40);
      }
    }

    // ── Parede (topo) ──────────────────────────────────
    g.fillStyle(0x12122a); g.fillRect(0, 0, W, 70);
    g.fillStyle(0x0a0a1f); g.fillRect(0, 65, W, 5);
    // Faixa decorativa
    g.fillStyle(0x7c3aed, 0.15); g.fillRect(0, 0, W, 3);

    // ── Divisória vertical ─────────────────────────────
    g.fillStyle(0x0d0d20, 0.9); g.fillRect(W*0.5 - 3, 70, 6, H - 70);
    g.fillStyle(0x7c3aed, 0.2); g.fillRect(W*0.5 - 1, 70, 2, H - 70);

    // ── Prateleiras na parede ──────────────────────────
    const shelfPositions = [30, 200, 390, 560];
    shelfPositions.forEach(sx => {
      // Base da prateleira
      g.fillStyle(0x78350f); g.fillRect(sx, 18, 100, 7);
      g.fillStyle(0x92400e); g.fillRect(sx, 14, 6, 11); g.fillRect(sx+94, 14, 6, 11);
      // Livros
      const bColors = [0xef4444, 0x3b82f6, 0x22c55e, 0xf59e0b, 0x8b5cf6, 0xec4899];
      bColors.forEach((c, i) => {
        g.fillStyle(c, 0.9); g.fillRect(sx + 8 + i*15, 5, 12, 13);
        g.fillStyle(0xffffff, 0.15); g.fillRect(sx + 8 + i*15, 5, 2, 13);
      });
    });

    // ── Relógio na parede ─────────────────────────────
    g.fillStyle(0x1e1e3a); g.fillCircle(W - 25, 30, 18);
    g.lineStyle(2, 0x7c3aed, 0.8); g.strokeCircle(W - 25, 30, 18);
    g.fillStyle(0xa855f7); g.fillRect(W-26, 14, 2, 16); // ponteiro hora
    g.fillRect(W-25, 24, 12, 2); // ponteiro minuto

    // ── Plantas de canto ──────────────────────────────
    [[5, H-5], [W-30, H-5]].forEach(([px, py]) => {
      g.fillStyle(0x78350f); g.fillRect(px+3, py-20, 14, 20);
      g.fillStyle(0x166534, 0.9); g.fillCircle(px+10, py-22, 14);
      g.fillStyle(0x15803d); g.fillCircle(px+4, py-28, 9); g.fillCircle(px+16, py-26, 10);
      g.fillStyle(0x22c55e, 0.4); g.fillCircle(px+10, py-24, 7);
    });

    // ── Grid para os agentes (4 cols x 3 rows) ─────────
    const COLS = 4, ROWS = 3;
    const cellW = W / COLS, cellH = (H - 70) / ROWS;

    AGENTS.forEach((agent) => {
      const cx = agent.col * cellW + cellW / 2;
      const cy = 70 + agent.row * cellH + cellH / 2;

      // ── Mesa ─────────────────────────────────────────
      const dW = 90, dH = 52;
      const dx = cx - dW/2, dy = cy - dH/2 + 8;

      // Sombra da mesa
      g.fillStyle(0x000000, 0.25);
      g.fillEllipse(cx, dy + dH + 6, dW*0.85, 10);

      // Tampo da mesa (madeira)
      g.fillStyle(0x7c4520); g.fillRect(dx, dy+10, dW, dH*0.55);
      g.fillStyle(0x8b4513, 0.5); g.fillRect(dx, dy+10, dW, 3);
      // Pés da mesa
      g.fillStyle(0x5c3310); g.fillRect(dx+4, dy+dH*0.55+10, 6, 12); g.fillRect(dx+dW-10, dy+dH*0.55+10, 6, 12);

      // Monitor
      g.fillStyle(0x0f172a); g.fillRect(dx+18, dy-2, dW*0.58, dH*0.52);
      g.fillStyle(agent.color, 0.85); g.fillRect(dx+20, dy, dW*0.54, dH*0.42);
      // Tela com pixel art do agente (símbolo)
      g.fillStyle(0xffffff, 0.2); g.fillRect(dx+22, dy+2, dW*0.24, dH*0.18);
      // Base do monitor
      g.fillStyle(0x1e293b); g.fillRect(dx+dW*0.35, dy+dH*0.5, 14, 6);

      // Teclado
      g.fillStyle(0x334155); g.fillRect(dx+10, dy+dH*0.6, dW*0.55, 7);
      g.fillStyle(0x475569, 0.6); g.fillRect(dx+12, dy+dH*0.6+1, 3, 4);
      g.fillRect(dx+17, dy+dH*0.6+1, 3, 4);
      g.fillRect(dx+22, dy+dH*0.6+1, 3, 4);

      // Mouse
      g.fillStyle(0x475569); g.fillEllipse(dx+dW*0.7, dy+dH*0.64, 8, 10);

      // ── Personagem Pixel Art ──────────────────────────
      const px = cx, py = dy - 8;

      // Sombra
      g.fillStyle(0x000000, 0.2); g.fillEllipse(px, py+2, 18, 5);

      // Pernas
      g.fillStyle(0x1e3a5f); g.fillRect(px-6, py-10, 5, 10); g.fillRect(px+1, py-10, 5, 10);
      // Sapatos
      g.fillStyle(0x0f172a); g.fillRect(px-7, py, 7, 4); g.fillRect(px, py, 7, 4);

      // Corpo (roupa com cor do agente)
      g.fillStyle(agent.color); g.fillRect(px-8, py-24, 16, 14);
      // Detalhe da roupa
      g.fillStyle(0xffffff, 0.15); g.fillRect(px-4, py-24, 2, 14);
      // Colarinho
      g.fillStyle(0xffffff, 0.3); g.fillRect(px-3, py-24, 6, 4);

      // Braços
      g.fillStyle(agent.color, 0.85); g.fillRect(px-13, py-23, 5, 10); g.fillRect(px+8, py-23, 5, 10);
      // Mãos
      g.fillStyle(0xfbbf24); g.fillRect(px-13, py-14, 5, 4); g.fillRect(px+8, py-14, 5, 4);

      // Pescoço
      g.fillStyle(0xfde68a); g.fillRect(px-3, py-28, 6, 4);

      // Cabeça
      g.fillStyle(0xfbbf24); g.fillRect(px-7, py-42, 14, 14);

      // Cabelo (cor diferente por agente)
      const hairColor = [0x7c3aed,0x2563eb,0x0891b2,0x059669,0xd97706,0x0e7490,0x6366f1,0x3b82f6,0xdc2626,0x7c3aed,0x475569,0x16a34a][AGENTS.indexOf(agent)] || agent.color;
      g.fillStyle(hairColor); g.fillRect(px-7, py-42, 14, 5);
      g.fillRect(px-7, py-42, 3, 10); // lateral
      g.fillRect(px+4, py-42, 3, 8);

      // Olhos
      g.fillStyle(0x1e293b); g.fillRect(px-4, py-34, 3, 3); g.fillRect(px+1, py-34, 3, 3);
      // Pupilas brilho
      g.fillStyle(0xffffff); g.fillRect(px-3, py-34, 1, 1); g.fillRect(px+2, py-34, 1, 1);
      // Boca
      g.fillStyle(0xf97316, 0.6); g.fillRect(px-3, py-29, 6, 2);

      // ── Indicador / nome ──────────────────────────────
      const nameText = this.add.text(cx, dy + dH + 18, agent.emoji + ' ' + agent.name, {
        fontSize: '9px', fontFamily: 'Courier New',
        color: '#' + agent.color.toString(16).padStart(6,'0'),
        stroke: '#000000', strokeThickness: 3,
        align: 'center',
      }).setOrigin(0.5, 0);

      // ── Zona clicável ─────────────────────────────────
      const zone = this.add.zone(cx, cy + 10, dW + 20, dH + 50).setInteractive({ useHandCursor: true });
      const hl = this.add.graphics();

      zone.on('pointerover', () => {
        hl.clear();
        hl.lineStyle(2, agent.color, 0.9);
        hl.strokeRect(dx-3, dy-3, dW+6, dH+6);
        this.tweens.add({ targets: nameText, scaleX: 1.1, scaleY: 1.1, duration: 150 });
      });
      zone.on('pointerout', () => {
        hl.clear();
        this.tweens.add({ targets: nameText, scaleX: 1, scaleY: 1, duration: 150 });
      });
      zone.on('pointerdown', () => {
        // Flash
        const flash = this.add.graphics();
        flash.fillStyle(agent.color, 0.3);
        flash.fillRect(dx-3, dy-46, dW+6, dH+50);
        this.tweens.add({ targets: flash, alpha: 0, duration: 300, onComplete: () => flash.destroy() });
        openChat(agent);
      });

      // Idle animation (slight bounce)
      const spriteY = py;
      let t = agent.col * 0.5 + agent.row * 1.2;
      // Não podemos animar o Graphics diretamente, mas podemos criar sprites
    });

    // ── Rodapé ─────────────────────────────────────────
    this.add.text(W - 6, H - 6, 'Agent Studio • Claude API', {
      fontSize: '8px', fontFamily: 'Courier New', color: '#2d2d4f', align: 'right',
    }).setOrigin(1, 1);

    // Relógio
    const clock = this.add.text(W - 52, 8, '', {
      fontSize: '12px', fontFamily: 'Courier New', color: '#4b5563',
      stroke: '#000', strokeThickness: 2,
    }).setOrigin(0, 0);
    this.time.addEvent({
      delay: 1000, loop: true, callback: () => {
        const n = new Date();
        clock.setText(n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0'));
      }
    });
  }
}

const game = new Phaser.Game({
  type: Phaser.CANVAS,
  width: 760, height: 520,
  parent: 'game-container',
  backgroundColor: '#0d0d1a',
  scene: Office,
  pixelArt: true,
  antialias: false,
  roundPixels: true,
});
</script>
</body>
</html>
