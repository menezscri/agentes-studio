<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🎮 Pixel Agents Studio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;overflow:hidden}
#wrap{display:flex;flex-direction:column;align-items:center}
#topbar{background:#07070f;border-bottom:2px solid #7c3aed;padding:6px 16px;display:flex;align-items:center;gap:12px;width:800px}
#topbar h1{color:#a855f7;font-size:12px;letter-spacing:3px;font-weight:bold}
#topbar span{color:#475569;font-size:10px}
canvas{border:2px solid #7c3aed;box-shadow:0 0 30px #7c3aed44;cursor:pointer;display:block}
#chatbox{background:#0a0a17;border-top:2px solid #7c3aed;padding:10px 14px;width:800px;display:none}
#chatheader{display:flex;align-items:center;gap:8px;margin-bottom:8px}
#chatname{color:#e2e8f0;font-size:12px;font-weight:bold}
#chatclose{margin-left:auto;background:none;border:1px solid #7c3aed44;color:#a855f7;padding:2px 10px;border-radius:4px;cursor:pointer;font-size:11px}
#chatmsgs{background:#050510;border:1px solid #1e1e3f;border-radius:4px;padding:8px;color:#94a3b8;font-size:11px;line-height:1.6;max-height:90px;overflow-y:auto;white-space:pre-wrap;margin-bottom:8px}
#chatrow{display:flex;gap:8px}
#chatinput{flex:1;background:#111128;border:1px solid #334155;color:#e2e8f0;padding:6px 10px;border-radius:4px;font-size:12px;outline:none;font-family:inherit}
#chatinput:focus{border-color:#7c3aed}
#sendbtn{background:#7c3aed;border:none;color:#fff;padding:6px 16px;border-radius:4px;cursor:pointer;font-size:12px}
#apibar{background:#05050e;border-top:1px solid #1a1a30;padding:5px 16px;display:flex;gap:8px;align-items:center;width:800px}
#apibar label{color:#4b5563;font-size:10px}
#apiinput{flex:1;background:#111128;border:1px solid #334155;color:#e2e8f0;padding:3px 8px;border-radius:4px;font-size:11px;outline:none}
#apisave{background:#059669;border:none;color:#fff;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px}
#apiok{color:#059669;font-size:10px}
</style>
</head>
<body>
<div id="wrap">
  <div id="topbar">
    <h1>🎮 PIXEL AGENTS STUDIO</h1>
    <span>Clique em um agente para conversar • 12 especialistas • powered by Claude</span>
  </div>
  <canvas id="c" width="800" height="520"></canvas>
  <div id="chatbox">
    <div id="chatheader">
      <span id="chatavatar" style="font-size:18px">🎨</span>
      <span id="chatname">Agente</span>
      <button id="chatclose" onclick="closeChat()">✕ fechar</button>
    </div>
    <div id="chatmsgs">Selecione um agente para começar...</div>
    <div id="chatrow">
      <input id="chatinput" type="text" placeholder="Sua pergunta..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button id="sendbtn" onclick="sendMsg()">▶</button>
    </div>
  </div>
  <div id="apibar">
    <label>🔑 Anthropic API Key:</label>
    <input id="apiinput" type="password" placeholder="sk-ant-..." oninput="setKey(this.value)">
    <button id="apisave" onclick="setKey(document.getElementById('apiinput').value)">Salvar</button>
    <span id="apiok"></span>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 520;

let apiKey = localStorage.getItem('ant_k') || '';
if (apiKey) { document.getElementById('apiinput').value = apiKey; document.getElementById('apiok').textContent = '✅ salva'; }

function setKey(v) {
  apiKey = v.trim();
  localStorage.setItem('ant_k', apiKey);
  document.getElementById('apiok').textContent = apiKey ? '✅ salva' : '';
}

const AGENTS = [
  {id:'pd',name:'Product Designer',emoji:'🎨',color:'#c026d3',r:0xc0,g:0x26,b:0xd3,col:0,row:0,system:'Você é um Product Designer Sênior. Especialista em design strategy e systems. Responda em PT-BR.'},
  {id:'ux',name:'UX Designer',emoji:'🔍',color:'#3b82f6',r:0x3b,g:0x82,b:0xf6,col:1,row:0,system:'Você é um UX Designer Sênior. Especialista em jornadas e usabilidade. Responda em PT-BR.'},
  {id:'ui',name:'UI Designer',emoji:'🖌️',color:'#06b6d4',r:0x06,g:0xb6,b:0xd4,col:2,row:0,system:'Você é um UI Designer Sênior. Especialista em sistemas visuais e tokens. Responda em PT-BR.'},
  {id:'re',name:'UX Research',emoji:'🔬',color:'#10b981',r:0x10,g:0xb9,b:0x81,col:3,row:0,system:'Você é um UX Researcher Sênior. Especialista em pesquisa qualitativa. Responda em PT-BR.'},
  {id:'co',name:'UX Content',emoji:'✍️',color:'#f59e0b',r:0xf5,g:0x9e,b:0x0b,col:0,row:1,system:'Você é um UX Content Strategist. Especialista em microcopy. Responda em PT-BR.'},
  {id:'de',name:'Data Engineer',emoji:'📊',color:'#0ea5e9',r:0x0e,g:0xa5,b:0xe9,col:1,row:1,system:'Você é um Engenheiro de Dados Sênior. Especialista em pipelines. Responda em PT-BR.'},
  {id:'fs',name:'Full Stack',emoji:'⚙️',color:'#818cf8',r:0x81,g:0x8c,b:0xf8,col:2,row:1,system:'Você é um Engenheiro Full Stack Sênior. Especialista em arquitetura. Responda em PT-BR.'},
  {id:'fe',name:'Front-end',emoji:'💻',color:'#60a5fa',r:0x60,g:0xa5,b:0xfa,col:3,row:1,system:'Você é um Engenheiro Front-end Sênior. Especialista em React. Responda em PT-BR.'},
  {id:'qa',name:'QA Sênior',emoji:'🧪',color:'#f87171',r:0xf8,g:0x71,b:0x71,col:0,row:2,system:'Você é um QA Sênior. Especialista em automação de testes. Responda em PT-BR.'},
  {id:'an',name:'Analista Prod.',emoji:'📈',color:'#a78bfa',r:0xa7,g:0x8b,b:0xfa,col:1,row:2,system:'Você é um Analista de Produto Sênior. Especialista em analytics. Responda em PT-BR.'},
  {id:'ct',name:'CTO',emoji:'🏗️',color:'#cbd5e1',r:0xcb,g:0xd5,b:0xe1,col:2,row:2,system:'Você é um CTO. Especialista em visão técnica. Responda em PT-BR.'},
  {id:'po',name:'Product Owner',emoji:'📋',color:'#4ade80',r:0x4a,g:0xde,b:0x80,col:3,row:2,system:'Você é um Product Owner Sênior. Especialista em backlog ágil. Responda em PT-BR.'},
];

const COLS = 4, ROWS = 3;
const CW = W / COLS, CH = (H - 70) / ROWS;
let hoveredAgent = null, activeAgent = null;
let histories = {};
let frame = 0;

// ── Pixel art helpers ──────────────────────────────────────
function hex(color) { return color; }

function drawPixelChar(agent, cx, cy, bounce) {
  const c = agent.color;
  const by = bounce;
  
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(cx, cy+3, 9, 3, 0, 0, Math.PI*2); ctx.fill();
  
  // Legs (dark pants)
  ctx.fillStyle = '#1e3a5f';
  ctx.fillRect(cx-6, cy-12+by, 5, 12);
  ctx.fillRect(cx+1, cy-12+by, 5, 12);
  
  // Shoes
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(cx-7, cy+by, 7, 4);
  ctx.fillRect(cx, cy+by, 7, 4);
  
  // Body (agent color)
  ctx.fillStyle = c;
  ctx.fillRect(cx-8, cy-26+by, 16, 14);
  
  // Shirt highlight
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(cx-5, cy-26+by, 2, 14);
  
  // Arms
  ctx.fillStyle = c;
  ctx.fillRect(cx-13, cy-25+by, 5, 11);
  ctx.fillRect(cx+8, cy-25+by, 5, 11);
  
  // Hands
  ctx.fillStyle = '#fbbf24';
  ctx.fillRect(cx-13, cy-15+by, 5, 4);
  ctx.fillRect(cx+8, cy-15+by, 5, 4);
  
  // Neck
  ctx.fillStyle = '#fde68a';
  ctx.fillRect(cx-3, cy-30+by, 6, 4);
  
  // Head
  ctx.fillStyle = '#fbbf24';
  ctx.fillRect(cx-8, cy-44+by, 16, 14);
  
  // Hair
  ctx.fillStyle = c;
  ctx.fillRect(cx-8, cy-44+by, 16, 5);
  ctx.fillRect(cx-8, cy-44+by, 3, 10);
  ctx.fillRect(cx+5, cy-44+by, 3, 9);
  
  // Eyes
  ctx.fillStyle = '#1e293b';
  ctx.fillRect(cx-5, cy-36+by, 3, 3);
  ctx.fillRect(cx+2, cy-36+by, 3, 3);
  
  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.fillRect(cx-4, cy-36+by, 1, 1);
  ctx.fillRect(cx+3, cy-36+by, 1, 1);
  
  // Mouth
  ctx.fillStyle = 'rgba(249,115,22,0.7)';
  ctx.fillRect(cx-3, cy-31+by, 6, 2);
}

function drawDesk(agent, dx, dy, dw, dh, isHover) {
  const c = agent.color;
  
  // Desk shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(dx+dw/2, dy+dh+8, dw*0.45, 6, 0, 0, Math.PI*2); ctx.fill();
  
  // Desk top (wood)
  ctx.fillStyle = '#7c4520';
  ctx.fillRect(dx, dy+10, dw, dh*0.55);
  
  // Wood grain
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  for (let i=0; i<4; i++) ctx.fillRect(dx+8+i*20, dy+10, 2, dh*0.55);
  
  // Desk edge highlight
  ctx.fillStyle = '#8b5a2b';
  ctx.fillRect(dx, dy+10, dw, 3);
  
  // Desk legs
  ctx.fillStyle = '#5c3310';
  ctx.fillRect(dx+3, dy+dh*0.55+10, 7, 14);
  ctx.fillRect(dx+dw-10, dy+dh*0.55+10, 7, 14);
  
  // Monitor back
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(dx+18, dy-4, dw*0.58, dh*0.52);
  
  // Monitor screen (agent color gradient effect)
  ctx.fillStyle = c;
  ctx.globalAlpha = 0.85;
  ctx.fillRect(dx+20, dy-2, dw*0.54, dh*0.44);
  ctx.globalAlpha = 1;
  
  // Screen scanlines
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  for (let y=0; y<dh*0.44; y+=3) ctx.fillRect(dx+20, dy-2+y, dw*0.54, 1);
  
  // Screen content (tiny code/graph)
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillRect(dx+23, dy+2, 12, 2);
  ctx.fillRect(dx+23, dy+6, 20, 2);
  ctx.fillRect(dx+23, dy+10, 8, 2);
  
  // Monitor stand
  ctx.fillStyle = '#1e293b';
  ctx.fillRect(dx+dw*0.38, dy+dh*0.5, 15, 7);
  
  // Keyboard
  ctx.fillStyle = '#334155';
  ctx.fillRect(dx+8, dy+dh*0.6, dw*0.55, 8);
  // Key rows
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  for (let k=0; k<4; k++) { ctx.fillRect(dx+10+k*14, dy+dh*0.6+2, 10, 4); }
  
  // Mouse
  ctx.fillStyle = '#475569';
  ctx.beginPath(); ctx.ellipse(dx+dw*0.72, dy+dh*0.65, 4, 5, 0, 0, Math.PI*2); ctx.fill();
  
  // Hover glow
  if (isHover) {
    ctx.strokeStyle = c;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.8;
    ctx.strokeRect(dx-2, dy-2, dw+4, dh+4);
    ctx.globalAlpha = 1;
  }
}

function drawRoom() {
  // ── Floor ─────────────────────────────────────────────
  for (let ty=0; ty<H; ty+=40) {
    for (let tx=0; tx<W; tx+=40) {
      const check = (Math.floor(tx/40)+Math.floor(ty/40)) % 2 === 0;
      ctx.fillStyle = check ? '#1c1c2e' : '#232340';
      ctx.fillRect(tx, ty, 40, 40);
    }
  }
  
  // ── Wall ──────────────────────────────────────────────
  ctx.fillStyle = '#12122a';
  ctx.fillRect(0, 0, W, 70);
  
  // Wall border
  const wg = ctx.createLinearGradient(0, 65, 0, 75);
  wg.addColorStop(0, '#0a0a1f');
  wg.addColorStop(1, '#1c1c2e');
  ctx.fillStyle = wg;
  ctx.fillRect(0, 65, W, 10);
  
  // Purple accent line on wall
  ctx.fillStyle = 'rgba(124,58,237,0.2)';
  ctx.fillRect(0, 0, W, 2);
  
  // ── Bookshelves ───────────────────────────────────────
  [20, 215, 410, 605].forEach(sx => {
    // Shelf board
    ctx.fillStyle = '#78350f';
    ctx.fillRect(sx, 20, 165, 8);
    // Ends
    ctx.fillStyle = '#92400e';
    ctx.fillRect(sx, 14, 7, 14);
    ctx.fillRect(sx+158, 14, 7, 14);
    // Books
    const bc = ['#ef4444','#3b82f6','#22c55e','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#f97316'];
    bc.slice(0,7).forEach((bk,i) => {
      ctx.fillStyle = bk;
      ctx.fillRect(sx+10+i*21, 4, 16, 16);
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(sx+10+i*21, 4, 3, 16);
    });
  });
  
  // ── Wall clock ────────────────────────────────────────
  ctx.fillStyle = '#1e1e3a';
  ctx.beginPath(); ctx.arc(W-28, 32, 20, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#7c3aed';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(W-28, 32, 20, 0, Math.PI*2); ctx.stroke();
  
  const now = new Date();
  const hAngle = (now.getHours()%12 / 12) * Math.PI*2 - Math.PI/2;
  const mAngle = (now.getMinutes() / 60) * Math.PI*2 - Math.PI/2;
  
  ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W-28, 32);
  ctx.lineTo(W-28+Math.cos(hAngle)*10, 32+Math.sin(hAngle)*10); ctx.stroke();
  ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W-28, 32);
  ctx.lineTo(W-28+Math.cos(mAngle)*15, 32+Math.sin(mAngle)*15); ctx.stroke();
  
  // ── Vertical divider ──────────────────────────────────
  ctx.fillStyle = 'rgba(13,13,32,0.85)';
  ctx.fillRect(W/2-3, 70, 6, H-70);
  ctx.fillStyle = 'rgba(124,58,237,0.25)';
  ctx.fillRect(W/2-1, 70, 2, H-70);
  
  // ── Corner plants ─────────────────────────────────────
  [[8, H-8], [W-32, H-8]].forEach(([px, py]) => {
    // Pot
    ctx.fillStyle = '#92400e';
    ctx.fillRect(px+2, py-22, 16, 22);
    ctx.fillStyle = '#78350f';
    ctx.fillRect(px, py-24, 20, 4);
    // Soil
    ctx.fillStyle = '#3d1a00';
    ctx.fillRect(px+2, py-22, 16, 6);
    // Plant
    ctx.fillStyle = '#166534';
    ctx.beginPath(); ctx.ellipse(px+10, py-26, 15, 16, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#15803d';
    ctx.beginPath(); ctx.ellipse(px+4, py-30, 10, 12, -0.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(px+16, py-28, 9, 11, 0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#22c55e';
    ctx.beginPath(); ctx.ellipse(px+10, py-28, 7, 8, 0, 0, Math.PI*2); ctx.fill();
  });
  
  // ── Floor light reflections ───────────────────────────
  ctx.fillStyle = 'rgba(124,58,237,0.04)';
  for (let i=0; i<3; i++) ctx.fillRect(i*280, 70, 140, H-70);
}

function getAgentAt(mx, my) {
  for (const a of AGENTS) {
    const cx = a.col*CW + CW/2;
    const cy = 70 + a.row*CH + CH/2;
    const dx = cx - 45, dy = cy - 30, dw = 90, dh = 55;
    if (mx >= dx-10 && mx <= dx+dw+10 && my >= dy-50 && my <= dy+dh+20) return a;
  }
  return null;
}

function render(t) {
  frame++;
  ctx.clearRect(0, 0, W, H);
  drawRoom();
  
  // Draw agents (back rows first for depth)
  for (let row=ROWS-1; row>=0; row--) {
    AGENTS.filter(a => a.row===row).forEach(a => {
      const cx = a.col*CW + CW/2;
      const cy = 70 + a.row*CH + CH/2;
      const dw = 90, dh = 55;
      const dx = cx - dw/2, dy = cy - dh/2 + 6;
      const isHov = hoveredAgent === a;
      const isAct = activeAgent === a;
      
      drawDesk(a, dx, dy, dw, dh, isHov || isAct);
      
      // Character bounce animation
      const bounce = Math.sin((t * 0.001) + a.col * 0.8 + a.row * 1.5) * 2;
      drawPixelChar(a, cx, dy - 5, Math.round(bounce));
      
      // Name label
      ctx.font = 'bold 9px Courier New';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#000';
      ctx.fillText(a.emoji + ' ' + a.name, cx+1, dy+dh+20+1);
      ctx.fillStyle = isHov || isAct ? '#fff' : a.color;
      ctx.fillText(a.emoji + ' ' + a.name, cx, dy+dh+20);
      
      // Active indicator
      if (isAct) {
        ctx.fillStyle = a.color;
        ctx.globalAlpha = 0.3 + 0.2 * Math.sin(t * 0.003);
        ctx.fillRect(dx-4, dy-54, dw+8, dh+60);
        ctx.globalAlpha = 1;
        
        ctx.font = '8px Courier New';
        ctx.fillStyle = a.color;
        ctx.fillText('▶ ATIVO', cx, dy-58);
      }
    });
  }
  
  // Footer
  ctx.font = '8px Courier New';
  ctx.textAlign = 'right';
  ctx.fillStyle = '#2d2d4f';
  ctx.fillText('Agent Studio • Claude API', W-6, H-6);
  
  requestAnimationFrame(render);
}

// ── Events ─────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) * (W / r.width);
  const my = (e.clientY - r.top) * (H / r.height);
  const found = getAgentAt(mx, my);
  hoveredAgent = found;
  canvas.style.cursor = found ? 'pointer' : 'default';
});

canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) * (W / r.width);
  const my = (e.clientY - r.top) * (H / r.height);
  const found = getAgentAt(mx, my);
  if (found) openChat(found);
});

// ── Chat ───────────────────────────────────────────────────
function openChat(agent) {
  activeAgent = agent;
  document.getElementById('chatavatar').textContent = agent.emoji;
  document.getElementById('chatname').textContent = agent.name;
  document.getElementById('chatname').style.color = agent.color;
  document.getElementById('chatbox').style.display = 'block';
  const h = histories[agent.id];
  if (h && h.length) renderMsgs(agent.id);
  else document.getElementById('chatmsgs').textContent = agent.emoji + ' Olá! Sou ' + agent.name + '. Como posso ajudar?';
  document.getElementById('chatinput').focus();
}

function closeChat() {
  document.getElementById('chatbox').style.display = 'none';
  activeAgent = null;
}

function renderMsgs(id) {
  const h = histories[id] || [];
  const el = document.getElementById('chatmsgs');
  if (!activeAgent) return;
  el.textContent = h.map(m => (m.role==='user'?'▶ Você: ':activeAgent.emoji+' '+activeAgent.name+': ')+m.content).join('\n\n');
  el.scrollTop = el.scrollHeight;
}

async function sendMsg() {
  if (!activeAgent) return;
  const inp = document.getElementById('chatinput');
  const txt = inp.value.trim(); if (!txt) return;
  inp.value = '';
  if (!apiKey) { document.getElementById('chatmsgs').textContent = '❌ Configure sua API Key abaixo primeiro!'; return; }
  const id = activeAgent.id;
  if (!histories[id]) histories[id] = [];
  histories[id].push({role:'user',content:txt});
  renderMsgs(id);
  const el = document.getElementById('chatmsgs');
  el.textContent += '\n\n⏳ ' + activeAgent.name + ' está pensando...';
  el.scrollTop = el.scrollHeight;
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1024,system:activeAgent.system,messages:histories[id].slice(-10)})
    });
    const data = await r.json();
    histories[id].push({role:'assistant',content:r.ok?data.content[0].text:'❌ Erro: '+(data.error?.message||r.status)});
  } catch(e) { histories[id].push({role:'assistant',content:'❌ '+e.message}); }
  renderMsgs(id);
}

requestAnimationFrame(render);
</script>
</body>
</html>
