<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#09090b">
  <title>SplitZ</title>
  <link rel="stylesheet" href="/css/app.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>💸</text></svg>">
</head>
<body>
  <!-- Toast notifications -->
  <div id="toast-container"></div>

  <!-- Sheet backdrop -->
  <div id="sheet-backdrop" class="sheet-backdrop"></div>

  <!-- Dialog backdrop -->
  <div id="dialog-backdrop" class="dialog-backdrop">
    <div class="dialog" id="dialog">
      <h3 id="dialog-title"></h3>
      <p id="dialog-body"></p>
      <div class="dialog-actions">
        <button class="btn btn-secondary" id="dialog-cancel">Cancelar</button>
        <button class="btn btn-destructive" id="dialog-confirm">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- App Shell -->
  <div id="app">

    <!-- Top Bar -->
    <header id="topbar" class="hidden">
      <button class="topbar-back hidden" id="topbar-back" aria-label="Voltar">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <h1 class="topbar-title" id="topbar-title">SplitZ</h1>
      <div class="topbar-actions" id="topbar-actions"></div>
    </header>

    <!-- Pages -->
    <main id="pages">

      <!-- Login -->
      <div id="page-login" class="page auth-page">
        <div class="auth-card">
          <div class="auth-logo">
            <div class="auth-logo-mark">SplitZ</div>
            <div class="auth-logo-sub">Divida gastos com amigos</div>
          </div>
          <form id="login-form">
            <div class="form-group">
              <label for="login-email">E-mail</label>
              <input type="email" id="login-email" class="input" placeholder="seu@email.com" autocomplete="email" required>
            </div>
            <div class="form-group">
              <label for="login-password">Senha</label>
              <input type="password" id="login-password" class="input" placeholder="••••••" autocomplete="current-password" required>
            </div>
            <div id="login-error" class="form-error mt-2" style="display:none"></div>
            <button type="submit" class="btn btn-primary btn-full btn-lg mt-4" id="login-submit">
              Entrar
            </button>
          </form>
          <div class="divider-with-label mt-4">ou</div>
          <button class="btn btn-outline btn-full" id="go-register">Criar conta</button>
        </div>
      </div>

      <!-- Register -->
      <div id="page-register" class="page auth-page">
        <div class="auth-card">
          <div class="auth-logo">
            <div class="auth-logo-mark">SplitZ</div>
            <div class="auth-logo-sub">Crie sua conta</div>
          </div>
          <form id="register-form">
            <div class="form-group">
              <label for="reg-name">Nome completo</label>
              <input type="text" id="reg-name" class="input" placeholder="Seu nome" autocomplete="name" required>
            </div>
            <div class="form-group">
              <label for="reg-email">E-mail</label>
              <input type="email" id="reg-email" class="input" placeholder="seu@email.com" autocomplete="email" required>
            </div>
            <div class="form-group">
              <label for="reg-password">Senha</label>
              <input type="password" id="reg-password" class="input" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required minlength="6">
            </div>
            <div id="reg-error" class="form-error mt-2" style="display:none"></div>
            <button type="submit" class="btn btn-primary btn-full btn-lg mt-4" id="reg-submit">
              Criar conta
            </button>
          </form>
          <div class="divider-with-label mt-4">já tem conta?</div>
          <button class="btn btn-outline btn-full" id="go-login">Entrar</button>
        </div>
      </div>

      <!-- Dashboard -->
      <div id="page-dashboard" class="page">
        <div id="dashboard-content"></div>
      </div>

      <!-- Groups List -->
      <div id="page-groups" class="page">
        <div id="groups-content"></div>
      </div>

      <!-- Group Detail -->
      <div id="page-group-detail" class="page">
        <div id="group-detail-content"></div>
      </div>

      <!-- New Group -->
      <div id="page-new-group" class="page">
        <div class="page-content" style="padding-top:16px">
          <form id="new-group-form">
            <div class="form-group">
              <label for="ng-name">Nome do grupo</label>
              <input type="text" id="ng-name" class="input" placeholder="Ex: Viagem para SP" required>
            </div>
            <div class="form-group">
              <label for="ng-desc">Descrição (opcional)</label>
              <textarea id="ng-desc" class="input" placeholder="Sobre o que é esse grupo?"></textarea>
            </div>
            <div class="form-group">
              <label>Adicionar amigos</label>
              <div id="ng-friends-list"></div>
            </div>
            <div id="ng-error" class="form-error" style="display:none"></div>
            <button type="submit" class="btn btn-primary btn-full btn-lg mt-4">Criar grupo</button>
          </form>
        </div>
      </div>

      <!-- Add Expense -->
      <div id="page-add-expense" class="page">
        <div class="page-content" style="padding-top:16px" id="add-expense-content"></div>
      </div>

      <!-- Expense Detail -->
      <div id="page-expense-detail" class="page">
        <div class="page-content" style="padding-top:16px" id="expense-detail-content"></div>
      </div>

      <!-- Friends -->
      <div id="page-friends" class="page">
        <div id="friends-content"></div>
      </div>

      <!-- Friend Requests -->
      <div id="page-friend-requests" class="page">
        <div id="friend-requests-content"></div>
      </div>

      <!-- Activity -->
      <div id="page-activity" class="page">
        <div id="activity-content"></div>
      </div>

      <!-- Settle Up -->
      <div id="page-settle" class="page">
        <div class="page-content" style="padding-top:16px" id="settle-content"></div>
      </div>

    </main>

    <!-- Bottom Nav -->
    <nav id="bottomnav" class="hidden">
      <button class="nav-item" data-nav="dashboard">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
        Início
      </button>
      <button class="nav-item" data-nav="groups">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Grupos
      </button>
      <button class="nav-item" data-nav="friends">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Amigos
      </button>
      <button class="nav-item" data-nav="activity">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Atividade
      </button>
    </nav>

  </div>

  <script src="/js/api.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/pages/auth.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/groups.js"></script>
  <script src="/js/pages/expenses.js"></script>
  <script src="/js/pages/friends.js"></script>
  <script src="/js/pages/activity.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
